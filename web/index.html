<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixie — Your Personal AI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg:#0F0A1E; --s:#1A1030; --s2:#241848; --p:#7C3AED; --pl:#EDE9FE; --pm:#6D28D9; --t:#EDE9FE; --mt:#9CA3AF; --b:#1F1440; }
body { background:var(--bg); color:var(--t); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

.header { display:flex; align-items:center; gap:12px; padding:14px 24px; border-bottom:0.5px solid var(--b); }
.hdot { width:10px; height:10px; border-radius:50%; background:var(--p); animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
.htitle { font-size:20px; font-weight:600; }
.hsub { font-size:12px; color:var(--pm); }
.hstatus { margin-left:auto; font-size:12px; color:var(--mt); display:flex; align-items:center; gap:6px; }
.sdot { width:7px; height:7px; border-radius:50%; background:#10B981; }

.main { display:flex; flex:1; overflow:hidden; }

.sidebar { width:260px; border-right:0.5px solid var(--b); display:flex; flex-direction:column; padding:18px 14px; gap:18px; overflow-y:auto; flex-shrink:0; }
.av-area { display:flex; flex-direction:column; align-items:center; gap:10px; }
.av-circle { width:90px; height:90px; border-radius:45px; background:var(--p); display:flex; align-items:center; justify-content:center; font-size:42px; transition:transform .3s; }
.av-circle.listening { animation:ringPulse 1s ease-out infinite; }
.av-circle.speaking  { animation:speakBob .25s ease-in-out infinite alternate; }
.av-circle.thinking  { animation:hueShift 3s linear infinite; }
@keyframes ringPulse { 0%{box-shadow:0 0 0 0 rgba(124,58,237,.7)}70%{box-shadow:0 0 0 14px rgba(124,58,237,0)}100%{box-shadow:0 0 0 0 rgba(124,58,237,0)} }
@keyframes speakBob  { from{transform:scale(1)}to{transform:scale(1.05)} }
@keyframes hueShift  { from{filter:hue-rotate(0)}to{filter:hue-rotate(360deg)} }
.av-name  { font-size:16px; font-weight:600; }
.av-state { font-size:12px; color:var(--mt); }
.waves { display:flex; gap:3px; height:20px; align-items:center; margin-top:4px; }
.wb { width:3px; border-radius:2px; background:var(--p); }
.wb:nth-child(1){animation:wv .6s 0s   ease-in-out infinite}
.wb:nth-child(2){animation:wv .6s .1s  ease-in-out infinite}
.wb:nth-child(3){animation:wv .6s .2s  ease-in-out infinite}
.wb:nth-child(4){animation:wv .6s .3s  ease-in-out infinite}
.wb:nth-child(5){animation:wv .6s .15s ease-in-out infinite}
@keyframes wv { 0%,100%{height:4px}50%{height:18px} }

.sec-title { font-size:11px; font-weight:600; color:var(--mt); letter-spacing:.06em; text-transform:uppercase; }
.mem-list { display:flex; flex-direction:column; gap:6px; }
.mem-item { background:var(--s); border-radius:8px; padding:8px 10px; font-size:12px; color:var(--pl); border:0.5px solid var(--b); }
.mem-type { font-size:10px; color:var(--mt); margin-bottom:2px; text-transform:uppercase; letter-spacing:.04em; }

.chat { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.msgs { flex:1; overflow-y:auto; padding:18px 22px; display:flex; flex-direction:column; gap:10px; }
.msgs::-webkit-scrollbar { width:4px; }
.msgs::-webkit-scrollbar-thumb { background:var(--s2); border-radius:2px; }
.mrow { display:flex; gap:8px; align-items:flex-end; }
.mrow.pixie { justify-content:flex-start; }
.mrow.user  { justify-content:flex-end; }
.mdot { width:7px; height:7px; border-radius:50%; background:var(--p); margin-bottom:6px; flex-shrink:0; }
.bbl { max-width:65%; padding:11px 15px; border-radius:16px; font-size:15px; line-height:1.55; }
.bbl.pixie { background:var(--s2); border-bottom-left-radius:3px; color:var(--pl); }
.bbl.user  { background:var(--p); border-bottom-right-radius:3px; color:#fff; }
.btime { font-size:10px; color:var(--mt); margin-top:4px; text-align:right; }
.typing { display:flex; align-items:center; gap:6px; color:var(--mt); font-size:13px; padding:6px 0; }
.tdot { width:6px; height:6px; border-radius:50%; background:var(--p); animation:tb .6s ease-in-out infinite; }
.tdot:nth-child(2){animation-delay:.1s}.tdot:nth-child(3){animation-delay:.2s}
@keyframes tb { 0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)} }

.inp-area { padding:14px 22px; border-top:0.5px solid var(--b); display:flex; gap:8px; align-items:flex-end; }
textarea.inp { flex:1; background:var(--s); border:0.5px solid var(--b); border-radius:14px; padding:11px 14px; color:var(--t); font-size:15px; resize:none; font-family:inherit; max-height:100px; outline:none; }
textarea.inp:focus { border-color:var(--p); }
textarea.inp::placeholder { color:var(--mt); }
.sbtn { width:42px; height:42px; border-radius:21px; background:var(--p); border:none; color:#fff; font-size:18px; cursor:pointer; transition:transform .1s,background .15s; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.sbtn:hover { background:var(--pm); transform:scale(1.05); }
.sbtn:disabled { background:#3B1F6E; cursor:not-allowed; transform:none; }
.ibtn { width:42px; height:42px; border-radius:21px; background:var(--s); border:0.5px solid var(--b); color:var(--t); font-size:18px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
.ibtn:hover { background:var(--s2); }
</style>
</head>
<body>
<div class="header">
  <div class="hdot"></div>
  <div><div class="htitle">Pixie</div><div class="hsub">your personal AI</div></div>
  <div class="hstatus"><div class="sdot"></div><span id="connStatus">Connecting...</span></div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="av-area">
      <div class="av-circle" id="avCircle">😊</div>
      <div class="av-name">Pixie</div>
      <div class="av-state" id="avState">Ready for you ✨</div>
      <div class="waves" id="waves" style="display:none">
        <div class="wb"></div><div class="wb"></div><div class="wb"></div>
        <div class="wb"></div><div class="wb"></div>
      </div>
    </div>
    <div>
      <div class="sec-title" style="margin-bottom:10px">Pixie's memory</div>
      <div class="mem-list" id="memList"><div class="mem-item" style="color:var(--mt)">Loading...</div></div>
    </div>
  </div>

  <div class="chat">
    <div class="msgs" id="msgs"></div>
    <div class="inp-area">
      <label class="ibtn" title="Send image">
        🖼️<input type="file" accept="image/*" id="imgFile" style="display:none" onchange="handleImg(this)">
      </label>
      <textarea class="inp" id="inp" rows="1" placeholder="Pixie se baat karo..."
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"
        onfocus="setAvatar('listening')" onblur="setAvatar('idle')"></textarea>
      <button class="sbtn" id="sendBtn" onclick="send()">→</button>
    </div>
  </div>
</div>
<audio id="audio" style="display:none"></audio>

<script>
// !! Replace with your actual Render URL after deploying !!
const BACKEND = "https://pixie-backend-e5rv.onrender.com";

const socket = io(BACKEND, { transports: ['websocket'] });
let busy = false;

socket.on('connect',    () => { document.getElementById('connStatus').textContent = 'Online'; });
socket.on('disconnect', () => { document.getElementById('connStatus').textContent = 'Reconnecting...'; });
socket.on('morning_briefing', ({ content, audio }) => {
  addMsg('assistant', content);
  if (audio) playAudio(audio);
});

const emojis = { idle:'😊', listening:'👂', thinking:'🤔', speaking:'💬', happy:'😄', sad:'🥺' };
const labels = { idle:'Ready for you ✨', listening:'Listening...', thinking:'Thinking...', speaking:'Speaking...', happy:'Yay!', sad:'Here for you 💜' };

function setAvatar(state) {
  const c = document.getElementById('avCircle');
  const l = document.getElementById('avState');
  const w = document.getElementById('waves');
  c.className = 'av-circle' + (state !== 'idle' ? ' ' + state : '');
  c.textContent = emojis[state] || '😊';
  l.textContent = labels[state] || '';
  w.style.display = state === 'speaking' ? 'flex' : 'none';
}

function addMsg(role, content) {
  const msgs = document.getElementById('msgs');
  const time = new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
  const row  = document.createElement('div');
  row.className = 'mrow ' + (role === 'assistant' ? 'pixie' : 'user');
  row.innerHTML = role === 'assistant'
    ? `<div class="mdot"></div><div><div class="bbl pixie">${content}</div><div class="btime">${time}</div></div>`
    : `<div><div class="bbl user">${content}</div><div class="btime" style="text-align:right">${time}</div></div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('msgs');
  const d = document.createElement('div');
  d.id = 'typing'; d.className = 'typing';
  d.innerHTML = '<div class="tdot"></div><div class="tdot"></div><div class="tdot"></div><span style="margin-left:4px">Pixie soch rahi hai...</span>';
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() { document.getElementById('typing')?.remove(); }

function playAudio(b64) {
  const a = document.getElementById('audio');
  a.src = 'data:audio/mp3;base64,' + b64;
  setAvatar('speaking');
  a.onended = () => setAvatar('idle');
  a.play().catch(() => setAvatar('idle'));
}

async function send(text = null, b64 = null, mime = null) {
  const inp = document.getElementById('inp');
  const msg = text ?? inp.value.trim();
  if (!msg && !b64) return;
  if (busy) return;
  busy = true;
  document.getElementById('sendBtn').disabled = true;
  inp.value = ''; inp.style.height = 'auto';
  addMsg('user', msg || 'Sent a photo');
  showTyping(); setAvatar('thinking');

  try {
    const body = { message: msg || 'What do you see?' };
    if (b64)  { body.imageBase64 = b64; body.imageType = mime; }
    const res  = await fetch(`${BACKEND}/api/chat`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const data = await res.json();
    hideTyping();
    addMsg('assistant', data.reply);
    if (data.audio) playAudio(data.audio);
    else { setAvatar(data.mood === 'happy' ? 'happy' : data.mood === 'sad' ? 'sad' : 'idle'); setTimeout(()=>setAvatar('idle'),2500); }
    loadMems();
  } catch {
    hideTyping(); addMsg('assistant', 'Arre yaar, kuch gadbad ho gayi. Dobara try karo!'); setAvatar('idle');
  }
  busy = false; document.getElementById('sendBtn').disabled = false;
}

function handleImg(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => send('Pixie, is photo mein kya hai?', e.target.result.split(',')[1], file.type);
  reader.readAsDataURL(file); input.value = '';
}

async function loadHistory() {
  try {
    const res  = await fetch(`${BACKEND}/api/history`);
    const msgs = await res.json();
    msgs.slice(-30).forEach(m => addMsg(m.role, m.content));
  } catch { addMsg('assistant', 'Heyy! Main hoon Pixie — tumhari personal AI. Kaise ho aaj? 😊'); }
}

async function loadMems() {
  try {
    const res  = await fetch(`${BACKEND}/api/memories`);
    const mems = await res.json();
    const list = document.getElementById('memList');
    list.innerHTML = mems.length
      ? mems.slice(0,8).map(m=>`<div class="mem-item"><div class="mem-type">${m.type}</div>${m.content}</div>`).join('')
      : '<div class="mem-item" style="color:var(--mt)">Talk to Pixie — she\'ll remember! 💜</div>';
  } catch {}
}

loadHistory(); loadMems();
</script>
</body>
</html>
